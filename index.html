<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bouncy Castle</title>
<script src="https://unpkg.com/colyseus.js@0.15.29/dist/colyseus.js"></script>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.js"></script>
</head>

<body>

<script>

const W = 1200;
const H = 600;
const PLAYER_HALF = 30; // half of 60px — converts server top-left coords to Phaser center

const config = {
    type: Phaser.AUTO,
    width: W,
    height: H,
    backgroundColor: '#87CEEB',
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

// --- Colyseus ---
const colyseusClient = new Colyseus.Client('ws://localhost:2567');
let room         = null;
let myPlayerIndex = null;

// --- Game state ---
let player1, player2;
let cursors, wasd;
let gameOver    = false;
let scene;
let scoreText;
let overlayElements = [];
let waitingText     = null;
let downJustPressed = false;
let frameSeq        = 0;

// --- Visuals ---
const YELLOW = 0xffdd00;
const RED    = 0xdd0000;
const BORDER = 0x880000;

function drawVerticalSegments(g, x, y, w, h, segH) {
    const count = Math.ceil(h / segH);
    const r = 8;
    for (let i = 0; i < count; i++) {
        const sy = y + i * segH;
        const sh = Math.min(segH, y + h - sy);
        if (sh <= 0) break;
        g.fillStyle(i % 2 === 0 ? YELLOW : RED);
        g.fillRoundedRect(x, sy, w, sh, r);
        g.lineStyle(2, BORDER);
        g.strokeRoundedRect(x, sy, w, sh, r);
    }
}

function drawHorizontalSegments(g, x, y, w, h, segW) {
    const count = Math.ceil(w / segW);
    const r = 8;
    for (let i = 0; i < count; i++) {
        const sx = x + i * segW;
        const sw = Math.min(segW, x + w - sx);
        if (sw <= 0) break;
        g.fillStyle(i % 2 === 0 ? YELLOW : RED);
        g.fillRoundedRect(sx, y, sw, h, r);
        g.lineStyle(2, BORDER);
        g.strokeRoundedRect(sx, y, sw, h, r);
    }
}

const game = new Phaser.Game(config);

function preload() {}

function create() {
    scene = this;

    // === SPIKES (top) ===
    const spikeGraphics = this.add.graphics();
    spikeGraphics.fillStyle(0x444444);
    const spikeCount = 38;
    const spikeW = W / spikeCount;
    const spikeH = 28;
    for (let i = 0; i < spikeCount; i++) {
        spikeGraphics.fillTriangle(
            i * spikeW,         0,
            (i + 0.5) * spikeW, spikeH,
            (i + 1) * spikeW,   0
        );
    }

    // === ACID (bottom) ===
    this.add.rectangle(W / 2, 585, W, 30, 0x00cc00).setStrokeStyle(2, 0x005500);

    // === BOUNCY SIDE WALLS ===
    const wallGfx = this.add.graphics();
    drawVerticalSegments(wallGfx,      0, 28, 36, 542, 36);
    drawVerticalSegments(wallGfx, W - 36, 28, 36, 542, 36);

    // === CASTLE ===
    const castleGfx = this.add.graphics();
    drawHorizontalSegments(castleGfx, W / 2 - 150, 510, 300, 60, 50);

    scoreText = this.add.text(W / 2, 543, '0 - 0', {
        font: 'bold 22px Arial',
        fill: '#ffffff',
        stroke: '#000000',
        strokeThickness: 3
    }).setOrigin(0.5).setDepth(1);

    // === PLAYERS (visual only — no physics) ===
    player1 = this.add.rectangle(480, 230, 60, 60, 0x00ff00).setStrokeStyle(3, 0x000000);
    player2 = this.add.rectangle(780, 230, 60, 60, 0xff0000).setStrokeStyle(3, 0x000000);

    // === CONTROLS ===
    cursors = this.input.keyboard.createCursorKeys();
    wasd = this.input.keyboard.addKeys({
        up:    Phaser.Input.Keyboard.KeyCodes.W,
        left:  Phaser.Input.Keyboard.KeyCodes.A,
        right: Phaser.Input.Keyboard.KeyCodes.D,
        down:  Phaser.Input.Keyboard.KeyCodes.S
    });

    // Track fast-fall as a one-shot flag
    this.input.keyboard.on('keydown-S',     () => { if (!gameOver) downJustPressed = true; });
    this.input.keyboard.on('keydown-DOWN',  () => { if (!gameOver) downJustPressed = true; });

    // === CONNECT TO SERVER ===
    connectToServer();
}

async function connectToServer() {
    waitingText = scene.add.text(W / 2, H / 2, 'Connecting...', {
        font: 'bold 28px Arial', fill: '#000000'
    }).setOrigin(0.5).setDepth(20);

    try {
        room = await colyseusClient.joinOrCreate('bouncy_castle');

        waitingText.setText('Waiting for opponent...');

        room.onMessage('PLAYER_ASSIGNED', ({ index }) => {
            myPlayerIndex = index;
            const controls = index === 1 ? 'You are Player 1 (green) — WASD' : 'You are Player 2 (red) — Arrow keys';
            scene.add.text(10, 10, controls, { font: '16px Arial', fill: '#000' });
        });

        room.onMessage('ROUND_START', () => {
            if (waitingText) { waitingText.destroy(); waitingText = null; }
            clearOverlay();
            gameOver = false;
        });

        room.onMessage('ROUND_OVER', ({ winner, wins1, wins2 }) => {
            gameOver = true;
            scoreText.setText(wins1 + ' - ' + wins2);
            showRoundOver(winner, wins1, wins2);
        });

        // Bind to player state changes — update visual positions
        room.state.players.onAdd((playerState) => {
            playerState.onChange(() => {
                const sprite = playerState.playerIndex === 1 ? player1 : player2;
                sprite.setPosition(
                    playerState.x + PLAYER_HALF,
                    playerState.y + PLAYER_HALF
                );
            });
        });

    } catch (e) {
        if (waitingText) waitingText.setText('Could not connect to server.');
        console.error(e);
    }
}

function showRoundOver(winner, wins1, wins2) {
    const winnerName = winner === 1 ? 'Player 1 (Green)' : winner === 2 ? 'Player 2 (Red)' : 'Draw!';
    const title      = winner === 0 ? 'Draw!' : winnerName + ' Wins!';

    const bg           = scene.add.rectangle(W / 2, 280, 420, 160, 0x000000, 0.75).setDepth(10);
    const winText      = scene.add.text(W / 2, 240, title, {
        font: 'bold 30px Arial', fill: '#ffffff'
    }).setOrigin(0.5).setDepth(11);
    const scoreDisplay = scene.add.text(W / 2, 282, 'Score  ' + wins1 + ' - ' + wins2, {
        font: '22px Arial', fill: '#aaffaa'
    }).setOrigin(0.5).setDepth(11);
    const btn          = scene.add.text(W / 2, 324, '[ NEXT ROUND ]', {
        font: 'bold 22px Arial', fill: '#ffff00',
        backgroundColor: '#333300', padding: { x: 12, y: 6 }
    }).setOrigin(0.5).setDepth(11).setInteractive({ useHandCursor: true });

    btn.on('pointerover', () => btn.setStyle({ fill: '#ffffff' }));
    btn.on('pointerout',  () => btn.setStyle({ fill: '#ffff00' }));
    btn.on('pointerdown', () => { if (room) room.send('NEXT_ROUND', {}); });

    overlayElements = [bg, winText, scoreDisplay, btn];
}

function clearOverlay() {
    overlayElements.forEach(el => el.destroy());
    overlayElements = [];
}

function update() {
    if (!room || myPlayerIndex === null || gameOver) return;

    const isP1 = myPlayerIndex === 1;
    const leftKey  = isP1 ? wasd.left    : cursors.left;
    const rightKey = isP1 ? wasd.right   : cursors.right;
    const upKey    = isP1 ? wasd.up      : cursors.up;

    room.send('INPUT', {
        left:            leftKey.isDown,
        right:           rightKey.isDown,
        up:              upKey.isDown,
        downJustPressed: downJustPressed,
        seq:             frameSeq++
    });

    downJustPressed = false;
}

</script>

</body>
</html>
