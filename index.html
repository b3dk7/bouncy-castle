<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bouncy Castle</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.js"></script>
</head>

<body>

<script>

const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#87CEEB',
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 800 },
            debug: false
        }
    },
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

let player1;
let player2;
let castle;

let cursors;
let wasd;

const game = new Phaser.Game(config);

function preload()
{
}

function create()
{
    // Bouncy castle platform
    castle = this.physics.add.staticGroup();

    const castlePlatform = this.add.rectangle(400, 550, 600, 60, 0xff69b4).setStrokeStyle(4, 0x000000);
    this.physics.add.existing(castlePlatform, true);

    castle.add(castlePlatform);

    // Player 1 (green)
    player1 = this.add.rectangle(260, 100, 60, 60, 0x00ff00).setStrokeStyle(3, 0x000000);
    this.physics.add.existing(player1);
    player1.body.setBounce(1);
    player1.body.setCollideWorldBounds(true);

    // Player 2 (red)
    player2 = this.add.rectangle(540, 100, 60, 60, 0xff0000).setStrokeStyle(3, 0x000000);
    this.physics.add.existing(player2);
    player2.body.setBounce(1);
    player2.body.setCollideWorldBounds(true);

    // Collisions
    this.physics.add.collider(player1, castle);
    this.physics.add.collider(player2, castle);

    // Controls
    cursors = this.input.keyboard.createCursorKeys();

    wasd = this.input.keyboard.addKeys({
        up: Phaser.Input.Keyboard.KeyCodes.W,
        left: Phaser.Input.Keyboard.KeyCodes.A,
        right: Phaser.Input.Keyboard.KeyCodes.D
    });

    // Instructions
    this.add.text(10, 10, 'WASD = Player 1 (green)   •   Arrow keys = Player 2 (red)', {
        font: '18px Arial',
        fill: '#000'
    });
}

function update()
{

    // Player 1 movement (WASD)
    if (wasd.left.isDown)
    {
        player1.body.setVelocityX(-200);
    }
    else if (wasd.right.isDown)
    {
        player1.body.setVelocityX(200);
    }
    else
    {
        player1.body.setVelocityX(0);
    }

    if (wasd.up.isDown && player1.body.touching.down)
    {
        player1.body.setVelocityY(-400);
    }

    // Player 2 movement (Arrow keys)
    if (cursors.left.isDown)
    {
        player2.body.setVelocityX(-200);
    }
    else if (cursors.right.isDown)
    {
        player2.body.setVelocityX(200);
    }
    else
    {
        player2.body.setVelocityX(0);
    }

    if (cursors.up.isDown && player2.body.touching.down)
    {
        player2.body.setVelocityY(-400);
    }
}

</script>

</body>
</html>
